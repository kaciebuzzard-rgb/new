---
layout: default
---
<article class="wrap" style="padding:84px 0;">
  <h1 style="margin-bottom:10px;">{{ page.title }}</h1>
  <p class="muted" style="margin-bottom:24px;">
    {% if page.date %}{{ page.date | date: "%B %-d, %Y" }}{% endif %}
  </p>
  <div class="card" style="padding:22px;">
    {{ content }}
  </div>
</article>
