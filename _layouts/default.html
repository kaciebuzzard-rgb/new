<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Main stylesheet (cache-busted) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>

<body>

  <a class="skip" href="#main">Skip to content</a>

  <header class="site-header">
    <nav class="nav">
      <div class="brand">
        <a href="{{ '/' | relative_url }}">
          {{ site.title }}
          <small>{{ site.description }}</small>
        </a>
      </div>

      <!-- IMPORTANT: use /# anchors so nav works on every page (home + excerpts) -->
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#services">Services</a>
        <a href="{{ '/' | relative_url }}#books">Books</a>
        <a href="{{ '/' | relative_url }}#excerpts">Excerpts</a>
        <a href="https://medium.com/@kwbuzzard" target="_blank" rel="noopener">Writing</a>
        <a class="pill" href="{{ '/' | relative_url }}#book">Book a Keynote</a>
      </div>
    </nav>
  </header>

  <main id="main" class="wrap">
    {{ content }}
  </main>

  <footer class="wrap" style="padding-top:0;">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
  </footer>

</body>
</html>
