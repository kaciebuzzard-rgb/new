<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }}{% if site.title %} • {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description | default: page.description | strip_html | strip_newlines | escape }}">

  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="nav-links">
      <a href="{{ '/' | relative_url }}#book">Books</a>
      <a href="{{ '/' | relative_url }}#contact">Contact</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="{{ '/excerpts/' | relative_url }}">Excerpts</a>
    </nav>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    <p class="muted">© {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </div>
</footer>

</body>
</html>
