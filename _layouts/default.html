<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>

<body>

<header class="site-header">
  <div class="wrap site-nav">

    <a class="nav-logo" href="{{ '/' | relative_url }}#top">
      Kacie Wielgus (Buzzard)
    </a>

    <nav class="nav-links" aria-label="Primary">
      <a href="{{ '/' | relative_url }}#about">About</a>
      <a href="{{ '/' | relative_url }}#books">Books</a>
      <a href="{{ '/' | relative_url }}#writing">Essays</a>

      <!-- Medium link -->
      <a class="nav-medium"
         href="https://medium.com/@kwbuzzard"
         target="_blank"
         rel="noopener">
         Medium
      </a>

      <a href="{{ '/' | relative_url }}#services">Services</a>

      <a class="nav-cta" href="{{ '/' | relative_url }}#contact">
        Contact
      </a>
    </nav>

  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <p class="muted">
      © {{ "now" | date: "%Y" }} {{ site.title }}
    </p>
  </div>
</footer>

</body>
</html>
