<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>

    {% if page.description %}
      <meta name="description" content="{{ page.description | strip_html | strip_newlines | escape }}" />
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>

  <body>
    <header class="site-header">
      <div class="nav">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav-links" aria-label="Primary">
          <a href="{{ '/' | relative_url }}#about">About</a>
          <a href="{{ '/' | relative_url }}#services">Services</a>
          <a href="{{ '/' | relative_url }}#books">Books</a>
          <a href="{{ '/excerpts/' | relative_url }}">Excerpts</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a class="pill" href="{{ '/' | relative_url }}#book">Book</a>
        </nav>
      </div>
    </header>
---
layout: default
---
<article class="wrap" style="padding:84px 0;">
  <h1 style="margin-bottom:10px;">{{ page.title }}</h1>
  <p class="muted" style="margin-bottom:24px;">
    {% if page.date %}{{ page.date | date: "%B %-d, %Y" }}{% endif %}
  </p>
  <div class="card" style="padding:22px;">
    {{ content }}
  </div>
</article>
    <main>
      {{ content }}
    </main>

    <footer>
      <div class="wrap">© {{ site.time | date: '%Y' }} {{ site.title }}.</div>
    </footer>
  </body>
</html>
