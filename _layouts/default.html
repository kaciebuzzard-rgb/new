<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>

<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap nav-row">
      <a class="nav-logo" href="{{ '/' | relative_url }}#top">
        {{ site.title | default: "Kacie Wielgus (Buzzard)" }}
      </a>

      <nav class="nav-links" aria-label="Primary">
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#services">Services</a>
        <a href="{{ '/' | relative_url }}#books">Books</a>
        <a href="{{ '/' | relative_url }}#writing">Writing</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a class="nav-cta" href="{{ '/' | relative_url }}#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-bottom">
        © {{ "now" | date: "%Y" }} {{ site.title | default: "Kacie Wielgus (Buzzard)" }}. All rights reserved.
      </div>
    </div>
  </footer>

</body>
</html>
